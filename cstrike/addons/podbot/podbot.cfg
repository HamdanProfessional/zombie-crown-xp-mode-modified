# ============================================================
# ULTIMATE PODBOT CONFIGURATION - Zombie Crown XP Mode
# ============================================================
# Maximum difficulty, perfect tactics, swarm behavior

# Waypoint folder
pb_wptfolder wptdefault

# Welcome messages
pb_welcomemsgs 0

# Speech (disabled for performance)
pb_usespeech 0

# ============================================================
# BOT COUNT SETTINGS
# ============================================================
# Minimum bots always on server (even if humans join)
pb_minbots 5

# Maximum bots (fills server with bots when empty)
pb_maxbots 20

# Bot quota (0 = disabled, 1 = 1 bot per human, etc)
pb_bot_quota_match 0

# ============================================================
# DIFFICULTY SETTINGS - MAXIMUM
# ============================================================
# Minimum bot skill (0-100) - set to 100 for perfect aim
pb_minbotskill 100

# Maximum bot skill (0-100) - set to 100 for perfect aim
pb_maxbotskill 100

# ============================================================
# BEHAVIOR SETTINGS
# ============================================================
# Team assignment (ANY, T, CT)
pb_bot_join_team "ANY"

# Force specific skin (5 = random)
pb_skin 5

# Spray paint (1 = on, 0 = off)
pb_sprays 0

# Chat messages (reduce for performance)
pb_chat 0

# Radio usage
pb_radio 0

# ============================================================
# COMBAT SETTINGS
# ============================================================
# Jumps with c4 (1 = yes, 0 = no)
pb_jasonmode 0

# Weapon mode (0 = best, 1 = random, 2 = pistols only)
pb_weaponmode 0

# ============================================================
# TACTICS - AGGRESSIVE
# ============================================================
# Reaction time (lower = faster, 0.0 = instant)
pb_aim_recoil_time 0.0

# Accuracy recovery (0.0 = instant)
pb_aim_recoil_stay 0.0

# Target focus time (seconds)
pb_aim_focus_time 999.0

# ============================================================
# MOVEMENT SETTINGS
# ============================================================
# Double jump (1 = yes, 0 = no)
pb_doublejump 1

# Auto kill the enemy when bomb planted
pb_autokill 1

# ============================================================
# NETWORK/OPTIMIZATION
# ============================================================
# Max ping for bots (higher = more tolerant)
pb_maxping 800

# ============================================================
# INITIALIZATION BOTS
# ============================================================
# Add 5 perfect bots on startup (T error)
pb add 100 1 1
pb add 100 2 2
pb add 100 1 5
pb add 100 2 5
pb add 100 2 5
