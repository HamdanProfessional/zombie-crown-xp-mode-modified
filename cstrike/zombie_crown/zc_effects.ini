; Zombie Crown XP Mode - Kill Effects Definitions
; Format: KEY = "Name|type|data|unlock_type|unlock_requirement|is_default"
; unlock_type: default, achievement, prestige, coins

[Default Effects]
; Basic screen fade effect (red)
EFFECT_DEFAULT = "Default|screen_fade|{color:[255,0,0],alpha:100,duration:0.5}|default|0|1"

[Achievement Effects]
; Blood burst - sprite explosion effect
EFFECT_BLOOD = "Blood Bath|sprite_burst|{sprite:sprites/blood.spr,count:20,radius:80,life:10}|achievement|150|0"

; Fire burst - combo effect with fade and shake
EFFECT_FIRE = "Fire Burst|combo|{effects:[screen_fade,screen_shake],color:[255,100,0],alpha:150,duration:1.0,shake:1}|achievement|200|0"

; Ice effect - frosty fade and shake
EFFECT_ICE = "Frost Bite|combo|{effects:[screen_fade,screen_shake],color:[100,200,255],alpha:150,duration:1.0,shake:1}|achievement|250|0"

; Lightning effect - electrical beam
EFFECT_LIGHTNING_ACH = "Lightning Strike|lightning|{color:[255,255,255],segments:10,radius:100}|achievement|300|0"

[Prestige Effects]
; Gold aura - prestigious effect
EFFECT_GOLD = "Golden Touch|beam_ring|{color:[255,215,0],radius:120,width:10,lifetime:0.5}|prestige|5|0"

; Rainbow effect
EFFECT_RAINBOW = "Rainbow|combo|{effects:[screen_fade,particle_trail],colors:[[255,0,0],[0,255,0],[0,0,255]]}|prestige|10|0"

[Shop Effects]
; Can be purchased with coins
EFFECT_POISON = "Poison Cloud|sprite_burst|{sprite:sprites/gas.spr,count:30,radius:100,life:15}|coins|1000|0"

EFFECT_ENERGY = "Energy Wave|beam_ring|{color:[0,255,255],radius:150,width:15,lifetime:0.8}|coins|2000|0"

EFFECT_DARKNESS = "Dark Energy|screen_fade|{color:[0,0,0],alpha:200,duration:1.5}|coins|3000|0"

EFFECT_PLASMA = "Plasma Storm|combo|{effects:[screen_fade,beam_ring],color:[255,0,255],alpha:150,duration:1.0,radius:100}|coins|5000|0"
