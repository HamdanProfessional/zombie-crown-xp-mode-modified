; Zombie Crown XP Mode - Modern HUD Configuration
; This file controls the appearance and behavior of the modern HUD system

[Modern HUD]
; Enable or disable the modern HUD system (0 = disabled, 1 = enabled)
ENABLED = 1

; How often to update HUD elements (in seconds)
UPDATE_INTERVAL = 1.0

; Maximum number of messages in the queue per player
MESSAGE_QUEUE_SIZE = 10

[HUD Elements]
; Status Bar - Shows health, armor, class, level
STATUS_BAR_ENABLED = 1
STATUS_BAR_X = -1.0
STATUS_BAR_Y = 0.91
STATUS_BAR_COLOR = 255,209,23

; Currency Bar - Shows XP, points, coins, ammo packs
CURRENCY_BAR_ENABLED = 1
CURRENCY_BAR_X = -1.0
CURRENCY_BAR_Y = 0.93
CURRENCY_BAR_COLOR = 255,255,255

; Challenge Tracker - Shows daily challenge progress
CHALLENGE_TRACKER_ENABLED = 1
CHALLENGE_TRACKER_X = 0.02
CHALLENGE_TRACKER_Y = 0.30
CHALLENGE_TRACKER_COLOR = 0,255,0

; Prestige Badge - Shows player's prestige level
PRESTIGE_BADGE_ENABLED = 1
PRESTIGE_BADGE_X = 0.02
PRESTIGE_BADGE_Y = 0.02

[Notifications]
; Achievement notification settings
ACHIEVEMENT_X = -1.0
ACHIEVEMENT_Y = 0.25
ACHIEVEMENT_COLOR = 255,215,0
ACHIEVEMENT_DURATION = 5.0

; Prestige notification settings
PRESTIGE_X = -1.0
PRESTIGE_Y = 0.25
PRESTIGE_COLOR = 255,215,0
PRESTIGE_DURATION = 8.0

; Challenge notification settings
CHALLENGE_X = -1.0
CHALLENGE_Y = 0.35
CHALLENGE_COLOR = 0,255,0
CHALLENGE_DURATION = 3.0

[Message Priorities]
; 0 = Critical (level up, achievements)
; 1 = High (challenge progress)
; 2 = Normal (regular stats)
; 3 = Low (debug info)

; Default positions for priority levels
PRIORITY_CRITICAL_X = -1.0
PRIORITY_CRITICAL_Y = 0.25

PRIORITY_HIGH_X = -1.0
PRIORITY_HIGH_Y = 0.30

PRIORITY_NORMAL_X = -1.0
PRIORITY_NORMAL_Y = 0.35

PRIORITY_LOW_X = 0.02
PRIORITY_LOW_Y = 0.02
